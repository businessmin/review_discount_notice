<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재주문 할인 미적용 예시</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Spoqa Han Sans Neo', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff; padding: 16px; color: #333333; margin: 0;
    }
    .case-card { border: 1px solid #e4e6e8; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .case-card:last-child { margin-bottom: 0; }
    .case-desc { font-size: 12px; color: #222222; margin: 0 0 8px; line-height: 1.55; }
    .result-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 10px;
    }
    .result-x { background: #FCEBEB; color: #A32D2D; }
    .tl-svg { width: 100%; display: block; overflow: visible; }
    .rule-box {
      background: #FAFAFA; border-radius: 8px; padding: 8px 10px; margin-top: 8px;
      font-size: 11px; color: #222222; line-height: 1.6;
      display: flex; align-items: flex-start; gap: 4px;
    }
    .rule-box strong { color: #111; font-weight: 700; }
    .divider { border: none; border-top: 1px solid #eaebee; margin: 12px 0; }
  </style>
</head>
<body>
<div style="border:1px solid #e4e6e8;border-radius:12px;padding:16px;background:#ffffff;">

  <!-- 예시 3 -->
  <div class="case-card">
    <div class="case-desc">할인 설정 전에 주문과 리뷰 작성을 완료했고,<br>할인 기간에 재주문한 경우</div>
    <span class="result-badge result-x">✖ 재주문 할인 미적용</span>
    <svg class="tl-svg" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="10" width="140" height="32" fill="#FAFAFA"/>
      <rect x="140" y="10" width="200" height="32" fill="#2AC1BC"/>
      <rect x="340" y="10" width="60" height="32" fill="#FAFAFA"/>
      <text x="70" y="30" text-anchor="middle" font-size="9" fill="#979797">설정 전</text>
      <text x="240" y="30" text-anchor="middle" font-size="9" fill="#A8EDEA">할인 기간</text>
      <text x="370" y="30" text-anchor="middle" font-size="9" fill="#979797">종료 후</text>
      <line x1="0" y1="42" x2="400" y2="42" stroke="#d0d2d5" stroke-width="1.5"/>
      <polygon points="55,36 51,30 59,30" fill="#979797"/><circle cx="55" cy="42" r="6" fill="#979797" stroke="#fff" stroke-width="2"/>
      <text x="55" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">주문</text>
      <polygon points="105,36 101,30 109,30" fill="#979797"/><circle cx="105" cy="42" r="6" fill="#979797" stroke="#fff" stroke-width="2"/>
      <text x="105" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">리뷰 작성</text>
      <polygon points="250,36 246,30 254,30" fill="#E24B4A"/><circle cx="250" cy="42" r="6" fill="#A32D2D" stroke="#fff" stroke-width="2"/>
      <text x="250" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">재주문</text>
      <text x="250" y="72" text-anchor="middle" font-size="9" fill="#A32D2D">(할인 미적용)</text>
    </svg>
    <div class="rule-box"><span>ℹ️</span><span>리뷰가 <strong>할인 기간 이전</strong>에 작성됐기 때문에 적용 대상이 아니에요. 기간 내 리뷰 작성이 기준이에요.</span></div>
  </div>

  <hr class="divider" />

  <!-- 예시 4 -->
  <div class="case-card">
    <div class="case-desc">할인 기간 내에 주문과 리뷰 작성을 완료했고,<br>할인 종료 후에 재주문한 경우</div>
    <span class="result-badge result-x">✖ 재주문 할인 미적용</span>
    <svg class="tl-svg" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="10" width="50" height="32" fill="#FAFAFA"/>
      <rect x="50" y="10" width="180" height="32" fill="#2AC1BC"/>
      <rect x="230" y="10" width="170" height="32" fill="#FAFAFA"/>
      <text x="25" y="30" text-anchor="middle" font-size="9" fill="#979797">설정 전</text>
      <text x="140" y="30" text-anchor="middle" font-size="9" fill="#A8EDEA">할인 기간</text>
      <text x="315" y="30" text-anchor="middle" font-size="9" fill="#979797">종료 후</text>
      <line x1="0" y1="42" x2="400" y2="42" stroke="#d0d2d5" stroke-width="1.5"/>
      <polygon points="110,36 106,30 114,30" fill="#979797"/><circle cx="110" cy="42" r="6" fill="#979797" stroke="#fff" stroke-width="2"/>
      <text x="110" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">주문</text>
      <polygon points="185,36 181,30 189,30" fill="#2AC1BC"/><circle cx="185" cy="42" r="6" fill="#2AC1BC" stroke="#fff" stroke-width="2"/>
      <text x="185" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">리뷰 작성</text>
      <polygon points="315,36 311,30 319,30" fill="#E24B4A"/><circle cx="315" cy="42" r="6" fill="#A32D2D" stroke="#fff" stroke-width="2"/>
      <text x="315" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#222222">재주문</text>
      <text x="315" y="72" text-anchor="middle" font-size="9" fill="#A32D2D">(할인 미적용)</text>
    </svg>
    <div class="rule-box"><span>ℹ️</span><span>재주문이 <strong>할인 종료 후</strong>에 이뤄지면, 할인이 적용되지 않아요.</span></div>
  </div>

</div>
</body>
</html>
