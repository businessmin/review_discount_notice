<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재주문 즉시할인 적용 예시</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Spoqa Han Sans Neo', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 16px;
      color: #333333;
      margin: 0;
    }


    .tab-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab-btn {
      font-size: 12px; font-weight: 500; padding: 6px 12px;
      border-radius: 20px; border: 1.5px solid #cccccc;
      background: #ffffff; color: #666666; cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .tab-btn.active { color: #111111; background: #f3f5f7; }
    .card {
      background: #ffffff; border: 1px solid #e4e6e8;
      border-radius: 12px; padding: 16px 14px;
    }
    .case-desc { font-size: 13px; color: #666666; margin: 0 0 10px; line-height: 1.55; }
    .result-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 700; padding: 4px 11px;
      border-radius: 20px; margin-bottom: 14px;
    }
    .result-o       { background: #EAF3DE; color: #3B6D11; }
    .result-x       { background: #FCEBEB; color: #A32D2D; }
    .result-partial { background: #FAEEDA; color: #633806; }
    .tl-svg { width: 100%; display: block; overflow: visible; }
    .rule-box {
      background: #f3f5f7; border-radius: 8px;
      padding: 9px 11px; margin-top: 10px;
      font-size: 12px; color: #555555; line-height: 1.65;
      display: flex; align-items: flex-start; gap: 5px;
    }
    .rule-box strong { color: #111111; font-weight: 700; }
  </style>
</head>
<body>
<div style="border:1px solid #e4e6e8;border-radius:12px;padding:16px;background:#ffffff;">

<!-- 상단 그룹 탭 + 예시 탭 -->
<div id="screen-cases">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <button id="group-btn-o" onclick="showCases('o')" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:2px solid #3B6D11;background:#F2FAF0;color:#3B6D11;cursor:pointer;">✅ 할인 적용</button>
    <button id="group-btn-x" onclick="showCases('x')" style="font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid #cccccc;background:#ffffff;color:#666;cursor:pointer;">❌ 할인 미적용</button>
  </div>
  <div class="tab-row" id="tabs"></div>
  <div class="card" id="content"></div>
</div>

<script>

const IDLE = '1.5px solid #cccccc';

      <text x="120" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">주문</text>
      <polygon points="210,36 206,30 214,30" fill="#185FA5"/>
      <circle cx="210" cy="42" r="6" fill="#185FA5" stroke="#fff" stroke-width="2"/>
      <text x="210" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">리뷰 작성</text>

      <circle cx="300" cy="42" r="6" fill="#3B6D11" stroke="#fff" stroke-width="2"/>
      <text x="300" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">재주문</text>

  {

      <circle cx="190" cy="42" r="6" fill="#185FA5" stroke="#fff" stroke-width="2"/>

    svg: `<svg class="tl-svg" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">

      <text x="70" y="30" text-anchor="middle" font-size="9" fill="#999">설정 전</text>

      <polygon points="105,36 101,30 109,30" fill="#888780"/>
      <circle cx="105" cy="42" r="6" fill="#888780" stroke="#fff" stroke-width="2"/>
      <text x="105" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">리뷰 작성</text>
      <polygon points="250,36 246,30 254,30" fill="#E24B4A"/>
      <circle cx="250" cy="42" r="6" fill="#A32D2D" stroke="#fff" stroke-width="2"/>
      <text x="250" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">재주문</text>
      <text x="250" y="72" text-anchor="middle" font-size="9" fill="#A32D2D">(할인 미적용)</text>
    </svg>`
  },
  {
    group: 'x', resultType: 'x',
    desc: '할인 기간 내에 주문과 리뷰 작성을 완료했고,<br>할인 종료 후에 재주문한 경우',
    resultLabel: '재주문 할인 미적용',
    rule: '재주문이 <strong>할인 종료 후</strong>에 이뤄지면, 할인이 적용되지 않아요.',
    svg: `<svg class="tl-svg" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="10" width="50" height="32" fill="#f3f5f7"/>
      <rect x="50" y="10" width="180" height="32" fill="#185FA5"/>
      <rect x="230" y="10" width="170" height="32" fill="#f3f5f7"/>
      <text x="25" y="30" text-anchor="middle" font-size="9" fill="#999">설정 전</text>
      <text x="140" y="30" text-anchor="middle" font-size="9" fill="#B5D4F4">할인 기간</text>
      <text x="315" y="30" text-anchor="middle" font-size="9" fill="#999">종료 후</text>
      <line x1="0" y1="42" x2="400" y2="42" stroke="#d0d2d5" stroke-width="1.5"/>
      <polygon points="110,36 106,30 114,30" fill="#888780"/>
      <circle cx="110" cy="42" r="6" fill="#888780" stroke="#fff" stroke-width="2"/>
      <text x="110" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">주문</text>
      <polygon points="185,36 181,30 189,30" fill="#185FA5"/>
      <circle cx="185" cy="42" r="6" fill="#185FA5" stroke="#fff" stroke-width="2"/>
      <text x="185" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">리뷰 작성</text>
      <polygon points="315,36 311,30 319,30" fill="#E24B4A"/>
      <circle cx="315" cy="42" r="6" fill="#A32D2D" stroke="#fff" stroke-width="2"/>
      <text x="315" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">재주문</text>
      <text x="315" y="72" text-anchor="middle" font-size="9" fill="#A32D2D">(할인 미적용)</text>
    </svg>`
  },
  {
    group: 'o', resultType: 'partial',
    desc: '2회 주문 후 할인 기간 내에 리뷰를 2건 작성한 경우,<br>재주문 할인은 1회만 적용',
    resultLabel: '재주문 할인 1회만 적용',
    rule: '<strong>직전 리뷰 1건</strong>에 대해서만 할인이 적용돼요. (누적 적용 X)',
    svg: `<svg class="tl-svg" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="10" width="40" height="32" fill="#f3f5f7"/>
      <rect x="40" y="10" width="320" height="32" fill="#185FA5"/>
      <rect x="360" y="10" width="40" height="32" fill="#f3f5f7"/>
      <text x="20" y="30" text-anchor="middle" font-size="9" fill="#999">설정 전</text>
      <text x="200" y="30" text-anchor="middle" font-size="9" fill="#B5D4F4">할인 기간</text>
      <text x="380" y="30" text-anchor="middle" font-size="9" fill="#999">종료 후</text>
      <line x1="0" y1="42" x2="400" y2="42" stroke="#d0d2d5" stroke-width="1.5"/>
      <polygon points="80,36 76,30 84,30" fill="#888780"/>
      <circle cx="80" cy="42" r="6" fill="#888780" stroke="#fff" stroke-width="2"/>
      <text x="80" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">주문 1</text>
      <polygon points="140,36 136,30 144,30" fill="#888780"/>
      <circle cx="140" cy="42" r="6" fill="#888780" stroke="#fff" stroke-width="2"/>
      <text x="140" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">주문 2</text>
      <polygon points="200,36 196,30 204,30" fill="#185FA5"/>
      <circle cx="200" cy="42" r="6" fill="#185FA5" stroke="#fff" stroke-width="2"/>
      <text x="200" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">리뷰 1</text>
      <polygon points="260,36 256,30 264,30" fill="#185FA5"/>
      <circle cx="260" cy="42" r="6" fill="#185FA5" stroke="#fff" stroke-width="2"/>
      <text x="260" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">리뷰 2</text>
      <polygon points="320,36 316,30 324,30" fill="#185FA5"/>
      <circle cx="320" cy="42" r="6" fill="#3B6D11" stroke="#fff" stroke-width="2"/>
      <text x="320" y="58" text-anchor="middle" font-size="10" font-weight="500" fill="#555">재주문</text>
      <text x="320" y="72" text-anchor="middle" font-size="9" fill="#888">(1회만 적용)</text>
    </svg>`
  }
];

const iconMap = { o: '✔', x: '✖', partial: '▲' };
let currentCases = [];

function showCases(group) {
  currentCases = ALL_CASES.filter(c => c.group === group);
  // 그룹 탭 스타일
  const bo = document.getElementById('group-btn-o');
  const bx = document.getElementById('group-btn-x');
  if (group === 'o') {
    bo.style.cssText = 'font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:2px solid #3B6D11;background:#F2FAF0;color:#3B6D11;cursor:pointer;';
    bx.style.cssText = 'font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid #cccccc;background:#ffffff;color:#666;cursor:pointer;';
  } else {
    bx.style.cssText = 'font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;border:2px solid #A32D2D;background:#FDF2F2;color:#A32D2D;cursor:pointer;';
    bo.style.cssText = 'font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid #cccccc;background:#ffffff;color:#666;cursor:pointer;';
  }
  const row = document.getElementById('tabs');
  row.innerHTML = '';
  currentCases.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.textContent = '예시 ' + (i + 1);
    btn.style.border = i === 0 ? `2.5px solid ${BORDER[c.resultType]}` : IDLE;
    row.appendChild(btn);
  });
  renderCase(0);
}

function setTabStyles(activeIdx) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (i === activeIdx) {
      btn.classList.add('active');
      btn.style.border = `2.5px solid ${BORDER[currentCases[i].resultType]}`;
    } else {
      btn.classList.remove('active');
      btn.style.border = IDLE;
    }
  });
}

function renderCase(idx) {
  const c = currentCases[idx];
  document.getElementById('content').innerHTML = `
    <div class="case-desc">${c.desc}</div>
    <span class="result-badge result-${c.resultType}">${iconMap[c.resultType]} ${c.resultLabel}</span>
    ${c.svg}
    <div class="rule-box"><span>ℹ️</span><span>${c.rule}</span></div>
  `;
}

showCases('o');

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const idx = +btn.dataset.idx;
  setTabStyles(idx);
  renderCase(idx);
});
</script>
</div>
</body>
</html>
