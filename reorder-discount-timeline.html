<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>재주문 즉시할인 적용 예시</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Spoqa Han Sans Neo', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 16px;
      color: #333333;
    }
    .tab-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab-btn {
      font-size: 13px; font-weight: 500; padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid #cccccc;
      background: #ffffff;
      color: #666666;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }
    .tab-btn.active {
      color: #111111;
      background: #f3f5f7;
    }
    .card {
      background: #ffffff;
      border: 1px solid #e4e6e8;
      border-radius: 12px;
      padding: 20px 16px 16px;
    }
    .case-desc  { font-size: 14px; color: #666666; margin-bottom: 14px; line-height: 1.55; }
    .result-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 700; padding: 5px 13px;
      border-radius: 20px; margin-bottom: 18px;
    }
    .result-o       { background: #EAF3DE; color: #3B6D11; }
    .result-x       { background: #FCEBEB; color: #A32D2D; }
    .result-partial { background: #FAEEDA; color: #633806; }
    .tl-svg { width: 100%; display: block; }
    .rule-box {
      background: #f3f5f7; border-radius: 8px;
      padding: 10px 12px; margin-top: 12px;
      font-size: 13px; color: #555555; line-height: 1.65;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .rule-box strong { color: #111111; font-weight: 700; }
  </style>
</head>

<div class="tab-row" id="tabs"></div>
<div class="card" id="content"></div>

const iconMap = { o: '✔', x: '✖', partial: '▲' };

function buildTabs() {
  const row = document.getElementById('tabs');
  CASES.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.textContent = '예시 ' + (i + 1);
    btn.style.border = i === 0 ? `2.5px solid ${BORDER[c.resultType]}` : IDLE;
    row.appendChild(btn);
  });
}

function setTabStyles(activeIdx) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    if (i === activeIdx) {
      btn.classList.add('active');
      btn.style.border = `2.5px solid ${BORDER[CASES[i].resultType]}`;
    } else {
      btn.classList.remove('active');
      btn.style.border = IDLE;
    }
  });
}

function renderCase(idx) {
  const c = CASES[idx];
  document.getElementById('content').innerHTML = `
    <div class="case-desc">${c.desc}</div>
    <span class="result-badge result-${c.resultType}">${iconMap[c.resultType]} ${c.resultLabel}</span>
    ${c.svg}
    <div class="rule-box"><span>ℹ️</span><span>${c.rule}</span></div>
  `;
}

document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  const idx = +btn.dataset.idx;
  setTabStyles(idx);
  renderCase(idx);
});

buildTabs();
renderCase(0);
</script>
</body>
</html>
